name: ServerMonitor
options:
  bundleIdPrefix: com.billdonner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  ServerMonitor:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: APP_TARGET
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ServerMonitor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: "YES"
    resources:
      - path: Assets.xcassets
      - path: LaunchScreen.storyboard
    dependencies:
      - target: ServerMonitorWidgetExtension

  ServerMonitorWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ServerMonitor.Widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Widget/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ServerMonitorWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ServerMonitor.watchkitapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    resources:
      - path: Assets.xcassets
    dependencies:
      - target: ServerMonitorWatchWidgetExtension

  ServerMonitorWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: WatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ServerMonitor.watchkitapp.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: WatchWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
