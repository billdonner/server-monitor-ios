name: ZerverMonitor
options:
  bundleIdPrefix: com.billdonner
  deploymentTarget:
    iOS: "18.5"
    watchOS: "10.0"
  xcodeVersion: "16.0"

targets:
  ZerverMonitor:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: Assets.xcassets
        type: resource
    settings:
      base:
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: APP_TARGET
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ZerverMonitor
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: "YES"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Zerver Monitor"
    dependencies:
      - target: ZerverMonitorWidgetExtension

  ZerverMonitorWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ZerverMonitor.Widget
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Widget/Info.plist
      properties:
        CFBundleVersion: "3"
        CFBundleDisplayName: "Zerver Monitor Widget"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ZerverMonitorWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
      - path: Assets.xcassets
        type: resource
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ZerverMonitor.watchkitapp
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.billdonner.ZerverMonitor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Zerver Monitor"
    dependencies:
      - target: ZerverMonitorWatchWidgetExtension

  ZerverMonitorWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: WatchWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.ZerverMonitor.watchkitapp.widget
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: WatchWidget/Info.plist
      properties:
        CFBundleVersion: "3"
        CFBundleDisplayName: "Zerver Monitor Watch Widget"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
